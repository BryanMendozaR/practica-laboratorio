<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Historial de Transferencias</h2>
        <button class="btn btn-outline-primary" (click)="goDashboard()">
            <i class="bi bi-arrow-left"></i> Volver al Dashboard
        </button>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center my-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2 text-muted">Cargando historial...</p>
    </div>

    <!-- Error -->
    <div *ngIf="error && !loading" class="alert alert-danger text-center">
        {{ error }}
        <button class="btn btn-outline-danger btn-sm ms-3" (click)="loadHistory()">Reintentar</button>
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && !error && transfers.length === 0" class="text-center my-5">
        <i class="bi bi-inbox" style="font-size: 64px; color: #ccc;"></i>
        <h4 class="mt-3 text-muted">No hay transferencias registradas</h4>
        <button class="btn btn-success mt-3" (click)="goDashboard()">
            Realizar una transferencia
        </button>
    </div>

    <!-- Table -->
    <div *ngIf="!loading && transfers.length > 0" class="card shadow-sm p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Destinatario</th>
                        <th>Monto</th>
                        <th>Descripción</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let t of transfers">
                        <td><code>{{ t.id }}</code></td>
                        <td>{{ t.receiverEmail }}</td>
                        <td class="fw-bold">${{ t.amount }}</td>
                        <td>{{ t.description }}</td>
                        <td>
                            <span class="badge" [ngClass]="t.status === 'COMPLETED' ? 'bg-success' : t.status === 'PENDING' ? 'bg-warning text-dark' : 'bg-secondary'">
                                {{ t.status }}
                            </span>
                        </td>
                        <td>{{ t.createdAt || t.date || '-' }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
