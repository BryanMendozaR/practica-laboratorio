<div class="container mt-5 card p-4 shadow-sm">
    <h4 class="mb-3 text-center">Verificación de seguridad TKS</h4>

    <!-- Paso 1: Enviar OTP -->
    <div *ngIf="!isSent">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" [(ngModel)]="email" class="form-control" placeholder="tu@correo.com">
        <button (click)="sendOtp()" class="btn btn-primary mt-3 w-100">Enviar código OTP</button>
    </div>


    <!-- Paso 2: Validar OTP -->
    <div *ngIf="isSent">
        <label for="otp">Ingrese el código OTP recibido</label>
        <input type="text" id="otp" [(ngModel)]="otp" class="form-control" placeholder="123456">
        <button (click)="verifyOtp()" class="btn btn-success mt-3 w-100">Verificar OTP</button>
    </div>

    <p class="text-center mt-3">{{ message }}</p>
</div>
