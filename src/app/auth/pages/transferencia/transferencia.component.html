<div class="container mt-5">
    <h3>Transacción Segura</h3>

    <!-- Paso 1: Enviar OTP -->
    <button *ngIf="!challengeSent" class="btn btn-primary" (click)="requestTransferToken()">
        Confirmar Transacción
    </button>

    <!-- Paso 2: Ingresar OTP
    <div *ngIf="challengeSent" class="mt-3">
        <label for="otp">Ingrese el código OTP</label>
        <input type="text" id="otp" [(ngModel)]="otp" class="form-control" placeholder="123456">
        <button class="btn btn-success mt-2" (click)="verifyOtp()">Validar y Ejecutar</button>
    </div>-->

    <!-- Resultado
    <div *ngIf="transactionResult" class="alert alert-success mt-3">
        {{ transactionResult.message }}
    </div>-->

    <!-- Botón Logout -->
    <button *ngIf="auth.isAuthenticated$ | async" (click)="logout()" class="btn btn-danger">
        Cerrar sesión
    </button>

    <ng-container *ngIf="!(auth.isLoading$ | async)">
        <ng-container *ngIf="auth.user$ | async as user">
            <p>Bienvenido {{ user.nickname }}</p>
        </ng-container>
    </ng-container>
</div>
